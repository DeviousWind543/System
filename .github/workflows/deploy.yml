name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Inject Supabase Credentials
        run: |
          # Reemplazar placeholders con credenciales reales desde GitHub Secrets
          sed -i "s|{{SUPABASE_URL}}|${{ secrets.SUPABASE_URL }}|g" js/config.template.js
          sed -i "s|{{SUPABASE_KEY}}|${{ secrets.SUPABASE_KEY }}|g" js/config.template.js
          
          # Renombrar template a config.js
          mv js/config.template.js js/config.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4